<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Far Lands</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #e8e4dc; min-height: 100vh; padding: 20px; }
  h1 { font-size: 22px; font-weight: 500; margin-bottom: 12px; color: #e8e4dc; }

  .breadcrumb { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #888; margin-bottom: 10px; }
  .breadcrumb .crumb { color: #7aafee; cursor: pointer; }
  .breadcrumb .crumb:hover { text-decoration: underline; }
  .breadcrumb .sep { color: #555; }
  .breadcrumb .cur { color: #e8e4dc; font-weight: 500; }

  .map-wrap { position: relative; width: 100%; border-radius: 10px; overflow: hidden; border: 1px solid #333; }
  .map-wrap img { display: block; width: 100%; height: auto; pointer-events: none; user-select: none; }
  .map-wrap svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

  .hotspot { cursor: pointer; }
  .hotspot polygon { fill: transparent; stroke: none; transition: fill 0.5s ease; }

  .region-label {
    pointer-events: none;
    font-size: 42px; font-weight: 600; font-family: system-ui, sans-serif;
    fill: transparent;
    text-anchor: middle;
    transition: fill 0.5s ease;
    paint-order: stroke;
    stroke: rgba(0,0,0,0);
    stroke-width: 6px;
  }
  .hotspot:hover .region-label {
    fill: rgba(255,255,255,0.9);
    stroke: rgba(0,0,0,0.5);
  }

  .tip {
    position: absolute; background: #111827cc; backdrop-filter: blur(6px);
    border: 1px solid #334155; border-radius: 8px; padding: 8px 12px;
    font-size: 12px; pointer-events: none; opacity: 0;
    transition: opacity 0.2s; z-index: 10; max-width: 180px;
  }
  .tip.show { opacity: 1; }
  .tip strong { display: block; font-size: 13px; font-weight: 500; color: #f1f5f9; margin-bottom: 2px; }
  .tip span { color: #94a3b8; }

  .info-panel { margin-top: 14px; background: #111827; border-radius: 10px; padding: 16px 18px; border: 1px solid #1e293b; }
  .info-panel h2 { font-size: 17px; font-weight: 500; margin-bottom: 6px; color: #f1f5f9; }
  .info-panel p { font-size: 13px; color: #94a3b8; line-height: 1.65; }
  .info-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .info-tag { font-size: 11px; padding: 3px 10px; border-radius: 20px; border: 1px solid #334155; color: #94a3b8; background: #1e293b; }
  .develop-btn {
    margin-top: 12px; display: inline-flex; align-items: center; gap: 6px;
    border: 1px dashed #334155; background: transparent; color: #94a3b8;
    border-radius: 8px; padding: 7px 14px; font-size: 12px; cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .develop-btn:hover { background: #1e293b; color: #f1f5f9; }
  .hint { font-size: 12px; color: #555; margin-top: 10px; }
</style>
</head>
<body>

<div class="breadcrumb" id="bc"><span class="cur">World Map</span></div>

      <radialGradient id="rg_farlands" gradientUnits="userSpaceOnUse"><stop offset="20%" stop-color="rgba(100,180,100,0.6)"/><stop offset="100%" stop-color="rgba(100,180,100,0)"/></radialGradient>

    pts: "1416,1573 1396,1597 1379,1627 1358,1648 1331,1661 1335,1692 1331,1712 1294,1749 1287,1773 1260,1773 1192,1800 1196,1854 1199,1909 1219,1970 1233,2007 1287,1997 1328,2010 1386,2034 1443,2027 1501,2027 1531,2058 1593,2014 1633,1997 1671,1963 1725,1837 1728,1800 1704,1709 1704,1658 1671,1614 1633,1597 1613,1583 1585,1583 1524,1604 1480,1580 1459,1563 1435,1556"

    // Note: island coords are at ~1/4 scale (traced on a smaller copy of the map).
    // They are scaled up 4x below in the engine to match the 3840x2160 viewBox.

      "621,1958 685,1948 743,1914 774,1860 797,1809 882,1704 906,1680 919,1596 872,1507 814,1514 665,1558 618,1514 570,1494 495,1521 465,1572 434,1619 411,1697 390,1738 295,1877 305,1942 351,1948 453,1958 520,1965 584,1972",

       // multiply all island coords by this to fit the 3840x2160 viewBox
  }

// ================================================================
// ENGINE
// ================================================================

// Convert a coord string into SVG points format, with optional scale
function toSvgPoints(str, scale) {
  scale = scale || 1;
  // Handles both "x,y x,y" and "x,y,x,y,x,y" formats from image-map.net
  const nums = str.trim().split(/[\s,]+/).map(Number);
  const pairs = [];
  for (let i = 0; i < nums.length; i += 2) {
    pairs.push((nums[i] * scale) + ',' + (nums[i+1] * scale));
  }
  return pairs.join(' ');
}

// Get all [x,y] pairs across all shapes in a region
function allCoords(r) {
  const scale = r.scale || 1;
  const sources = r.shapes || [r.pts];
  return sources.flatMap(s => {
    const nums = s.trim().split(/[\s,]+/).map(Number);
    const pairs = [];
    for (let i = 0; i < nums.length; i += 2) pairs.push([nums[i] * scale, nums[i+1] * scale]);
    return pairs;
  });
}

let activeRegion = null;
const tip  = document.getElementById('tip');
const svg  = document.getElementById('hotspotSvg');
const wrap = document.getElementById('mapWrap');
const info = document.getElementById('infoBox');
const bc   = document.getElementById('bc');

REGIONS.forEach(r => {
  const sources = r.shapes || [r.pts];

  // Each shape gets its own gradient centred on its own bounding box.
  // Single-shape regions just update the base gradient directly.
  const gradIds = sources.map((src, i) => {
    const nums = src.trim().split(/[\s,]+/).map(Number);
    const pairs = [];
    for (let j = 0; j < nums.length; j += 2) pairs.push([nums[j] * (r.scale||1), nums[j+1] * (r.scale||1)]);
    const xs = pairs.map(p => p[0]), ys = pairs.map(p => p[1]);
    const minX = Math.min(...xs), maxX = Math.max(...xs);
    const minY = Math.min(...ys), maxY = Math.max(...ys);
    const w = maxX - minX, h = maxY - minY;

    const base = svg.querySelector(`#${r.grad}`);
    if (!base) return r.grad;

    if (sources.length === 1) {
      base.setAttribute('cx', minX + w / 2);
      base.setAttribute('cy', minY + h / 2);
      base.setAttribute('r',  Math.max(w, h) / 2);
      return r.grad;
    }

    const gradId = `${r.grad}_${i}`;
    let clone = svg.querySelector(`#${gradId}`);
    if (!clone) {
      clone = base.cloneNode(true);
      clone.setAttribute('id', gradId);
      base.parentNode.appendChild(clone);
    }
    clone.setAttribute('cx', minX + w / 2);
    clone.setAttribute('cy', minY + h / 2);
    clone.setAttribute('r',  Math.max(w, h) / 2);
    return gradId;
  });

  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  g.classList.add('hotspot');

  const polys = sources.map((src, i) => {
    const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
    poly.setAttribute('points', toSvgPoints(src, r.scale));
    poly.style.fill   = 'transparent';
    poly.style.stroke = 'none';
    poly._gradId = gradIds[i];
    g.appendChild(poly);
    return poly;
  });

  // Label
  const lbl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  lbl.classList.add('region-label');
  lbl.setAttribute('x', (r.lx * (r.scale || 1)));
  lbl.setAttribute('y', (r.ly * (r.scale || 1)));
  lbl.textContent = r.name;
  g.appendChild(lbl);

  svg.appendChild(g);

  // Hover any island — all light up, each with its own centred gradient
  polys.forEach(poly => {
    poly.addEventListener('mouseenter', () => {
      polys.forEach(p => p.style.fill = `url(#${p._gradId})`);
      tip.innerHTML = `<strong>${r.name}</strong><span>${r.type}</span>`;
      tip.classList.add('show');
    });
    poly.addEventListener('mouseleave', () => {
      polys.forEach(p => p.style.fill = 'transparent');
      tip.classList.remove('show');
    });
  });
  g.addEventListener('mousemove', e => {
    const rect = wrap.getBoundingClientRect();
    let x = e.clientX - rect.left + 14;
    let y = e.clientY - rect.top  - 10;
    if (x + 190 > rect.width) x = e.clientX - rect.left - 195;
    tip.style.left = x + 'px';
    tip.style.top  = y + 'px';
  });
  g.addEventListener('click', () => {
    activeRegion = r;
    bc.innerHTML = `<span class="crumb" onclick="clearRegion()">World Map</span>
                    <span class="sep">›</span>
                    <span class="cur">${r.name}</span>`;
    info.innerHTML = `
      <div class="info-panel">
        <h2>${r.name}</h2>
        <p>${r.desc}</p>
        <div class="info-tags">${r.tags.map(t => `<span class="info-tag">${t}</span>`).join('')}</div>
      </div>
      <button class="develop-btn" onclick="askClaude('${r.name}')">+ Develop ${r.name}</button>`;
  });
});

function clearRegion() {
  activeRegion = null;
  bc.innerHTML  = `<span class="cur">World Map</span>`;
  info.innerHTML = `<p class="hint">Click any region to explore it.</p>`;
}

function askClaude(regionName) {
  const prompt = `Flesh out ${regionName} in my D&D world — give it key locations, an NPC, and a quest hook.`;
  if (typeof sendPrompt === 'function') sendPrompt(prompt);
  else alert('Prompt: ' + prompt);
}
